{% extends 'layout.html' %}

{% block content %}
<h1 class="my-4 display-4 fw-normal">Статусы</h1>

<a class="btn btn-primary mb-3" href="{% url 'status_create' %}">Создать статус</a>

<table class="table table-striped table-bordered mt-3">
    <thead>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Дата создания</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for s in statuses %}
        <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.created_at|date:"d.m.Y H:i" }}</td>
            <td>
                <a class="text-decoration-none me-2" href="{% url 'status_update' s.id %}">Изменить</a>
                <a class="text-decoration-none text-danger" href="{% url 'status_delete' s.id %}">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
